name: BPB Action Proxy

on:
  workflow_dispatch:
    inputs:
      protocol:
        description: "Proxy protocol"
        required: true
        default: "hysteria2"
        type: choice
        options:
          - vless
          - hysteria2

env:
  COORDINATOR_URL: ${{ secrets.COORDINATOR_URL }}
  AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
  NETWORK_ID: ${{ secrets.NETWORK_ID || 'bpb-default' }}

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Step 1: Install proxy software ---
      - name: Install Hysteria2
        if: github.event.inputs.protocol == 'hysteria2' || github.event.inputs.protocol == ''
        run: |
          echo "📦 Installing Hysteria2..."
          HY2_URL=$(curl -sL https://api.github.com/repos/apernet/hysteria/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*hysteria-linux-amd64"' \
            | grep -v avx | head -1 | sed 's/.*: *"\(.*\)"$/\1/')
          if [ -z "$HY2_URL" ]; then
            HY2_URL="https://github.com/apernet/hysteria/releases/download/app/v2.9.2/hysteria-linux-amd64"
          fi
          echo "Downloading from: $HY2_URL"
          wget -q "$HY2_URL" -O /tmp/hysteria && chmod +x /tmp/hysteria && sudo mv /tmp/hysteria /usr/local/bin/hysteria
          hysteria version || echo "⚠️ Hysteria2 version check failed but binary may still work"

      - name: Install sing-box (VLESS)
        if: github.event.inputs.protocol == 'vless'
        run: |
          echo "📦 Installing sing-box..."
          SINGBOX_URL=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*linux-amd64[^"]*\.tar\.gz"' \
            | head -1 | sed 's/.*: *"\(.*\)"$/\1/')
          if [ -z "$SINGBOX_URL" ]; then
            SINGBOX_URL="https://github.com/SagerNet/sing-box/releases/download/v1.10.0/sing-box-1.10.0-linux-amd64.tar.gz"
          fi
          echo "Downloading from: $SINGBOX_URL"
          wget -q "$SINGBOX_URL" -O /tmp/sing-box.tar.gz
          mkdir -p /tmp/sing-box-extract
          tar -xzf /tmp/sing-box.tar.gz -C /tmp/sing-box-extract/
          find /tmp/sing-box-extract -name "sing-box" -type f -exec sudo cp {} /usr/local/bin/sing-box \;
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version || echo "⚠️ sing-box version check failed but binary may still work"

      # --- Step 2: Generate random credentials ---
      - name: Generate credentials
        id: creds
        run: |
          echo "uuid=$(uuidgen)" >> $GITHUB_OUTPUT
          echo "password=$(openssl rand -hex 16)" >> $GITHUB_OUTPUT
          echo "port=$(shuf -i 20000-65000 -n 1)" >> $GITHUB_OUTPUT

      # --- Step 3: Create Hysteria2 config ---
      # Hysteria2 generates self-signed certs automatically when no TLS is configured.
      # We use a self-signed cert pair so the server can start.
      - name: Setup Hysteria2
        if: github.event.inputs.protocol == 'hysteria2'
        env:
          PASSWORD: ${{ steps.creds.outputs.password }}
          PORT: ${{ steps.creds.outputs.port }}
        run: |
          echo "🚀 Setting up Hysteria2..."
          # Generate self-signed TLS cert (required by Hysteria2 server)
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
            -nodes -keyout /tmp/hy2-key.pem -out /tmp/hy2-cert.pem \
            -days 1 -subj "/CN=bpb-action"

          cat > /tmp/hysteria.yaml <<YAML
          listen: :$PORT
          tls:
            cert: /tmp/hy2-cert.pem
            key: /tmp/hy2-key.pem
          auth:
            type: password
            password: $PASSWORD
          masquerade:
            type: proxy
            proxy:
              url: https://bing.com
              rewriteHost: true
          YAML
          nohup hysteria server --config /tmp/hysteria.yaml > /tmp/hy2.log 2>&1 &
          sleep 2
          if ! grep -q "FATAL" /tmp/hy2.log 2>/dev/null; then
            echo "🔗 Hysteria2 started on port $PORT"
          else
            echo "⚠️ Hysteria2 failed to start"
            cat /tmp/hy2.log
          fi

      # --- Step 4: Create VLESS config ---
      - name: Setup sing-box (VLESS)
        if: github.event.inputs.protocol == 'vless'
        env:
          UUID: ${{ steps.creds.outputs.uuid }}
          PORT: ${{ steps.creds.outputs.port }}
        run: |
          echo "🚀 Setting up VLESS..."
          cat > /tmp/sing-box.json <<JSON
          {
            "inbounds": [
              {
                "type": "vless",
                "listen": "::",
                "listen_port": $PORT,
                "users": [{ "uuid": "$UUID" }]
              }
            ],
            "outbounds": [{ "type": "direct" }]
          }
          JSON
          nohup sing-box run -c /tmp/sing-box.json > /tmp/singbox.log 2>&1 &
          echo "🔗 VLESS started on port $PORT"

      # --- Step 5: Install cloudflared tunnel ---
      - name: Setup Cloudflare Tunnel
        run: |
          echo "🌐 Setting up Cloudflare Tunnel..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb 2>/dev/null || true

          # Start tunnel pointing at the proxy port
          nohup cloudflared tunnel --no-autoupdate --url http://localhost:${{ steps.creds.outputs.port }} > /tmp/tunnel.log 2>&1 &
          sleep 8

          # Extract tunnel URL
          TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -n1 || echo "")
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "🌍 Tunnel URL: $TUNNEL_URL"

          if [ -z "$TUNNEL_URL" ]; then
            echo "⚠️ Failed to get tunnel URL. Tunnel log:"
            tail -20 /tmp/tunnel.log
          fi

      # --- Step 5.7: Calculate expiry time ---
      - name: Calculate expiry time
        run: |
          EXPIRES_AT=$(date -u -d "+45 minutes" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v+45M +%Y-%m-%dT%H:%M:%SZ)
          echo "EXPIRES_AT=$EXPIRES_AT" >> $GITHUB_ENV

      # --- Step 6: Register with coordinator ---
      # Build JSON payload as a temp file to avoid shell quoting nightmares.
      - name: Register proxy
        if: env.COORDINATOR_URL != ''
        run: |
          echo "📡 Registering with coordinator..."
          PROXY_ID="gha-$GITHUB_RUN_ID"
          HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
          CREATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ "${{ github.event.inputs.protocol }}" == "hysteria2" ]; then
            cat > /tmp/register.json <<EOF
          {
            "protocol": "hysteria2",
            "id": "${PROXY_ID}",
            "host": "${HOST}",
            "port": 443,
            "password": "${{ steps.creds.outputs.password }}",
            "sni": "${HOST}",
            "createdAt": "${CREATED_AT}",
            "expiresAt": "${EXPIRES_AT}"
          }
          EOF
          elif [ "${{ github.event.inputs.protocol }}" == "vless" ]; then
            cat > /tmp/register.json <<EOF
          {
            "protocol": "vless",
            "id": "${PROXY_ID}",
            "host": "${HOST}",
            "port": 443,
            "uuid": "${{ steps.creds.outputs.uuid }}",
            "sni": "${HOST}",
            "createdAt": "${CREATED_AT}",
            "expiresAt": "${EXPIRES_AT}"
          }
          EOF
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${COORDINATOR_URL}/register" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -d @/tmp/register.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "📡 Registration response (HTTP $HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "⚠️ Registration failed! Dumping payload for debug:"
            cat /tmp/register.json
          fi

      # --- Step 7: Print subscription URL ---
      - name: Output subscription info
        run: |
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "🎉 BPB Action Proxy is running!"
          echo ""
          echo "🔗 Protocol: ${{ github.event.inputs.protocol || 'hysteria2' }}"
          echo "🔗 Public URL: $TUNNEL_URL"
          echo ""
          if [ "${{ github.event.inputs.protocol }}" == "hysteria2" ] || [ -z "${{ github.event.inputs.protocol }}" ]; then
            echo "🔐 Password: ${{ steps.creds.outputs.password }}"
          elif [ "${{ github.event.inputs.protocol }}" == "vless" ]; then
            echo "🔐 UUID: ${{ steps.creds.outputs.uuid }}"
          fi
          echo ""
          if [ -n "$COORDINATOR_URL" ]; then
            echo "📋 Subscription URL: $COORDINATOR_URL/sub/all"
            echo "   (Paste this into Hiddify!)"
          else
            echo "⚠️  No COORDINATOR_URL set - here is your direct connection string:"
            echo ""
            HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
            if [ "${{ github.event.inputs.protocol }}" == "hysteria2" ] || [ -z "${{ github.event.inputs.protocol }}" ]; then
              echo "hysteria2://${{ steps.creds.outputs.password }}@${HOST}:443?insecure=1&sni=${HOST}#BPB-Action-Direct"
            elif [ "${{ github.event.inputs.protocol }}" == "vless" ]; then
              echo "vless://${{ steps.creds.outputs.uuid }}@${HOST}:443?security=tls&encryption=none&headerType=none&type=tcp&sni=${HOST}#BPB-Action-Direct"
            fi
          fi
          echo ""
          echo "⏱️  This runner will stay alive for 45 minutes max"
          echo "═══════════════════════════════════════════════"

      # --- Step 8: Keep alive with heartbeat ---
      - name: Keep runner alive with heartbeat
        run: |
          echo "💤 Keeping alive with heartbeat every 5 min..."
          HEARTBEAT_ID="gha-$GITHUB_RUN_ID"
          HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
          MINUTES_LEFT=45
          for i in $(seq 1 45); do
            # Send heartbeat every 5 minutes
            if [ $((i % 5)) -eq 0 ] && [ -n "$COORDINATOR_URL" ]; then
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "${COORDINATOR_URL}/heartbeat" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${AUTH_TOKEN}" \
                -d "{\"id\": \"${HEARTBEAT_ID}\", \"expiresAt\": \"${EXPIRES_AT}\"}" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "404" ]; then
                echo "⚠️ Proxy record lost, re-registering..."
                # Rebuild registration JSON using printf (safer than nested heredocs)
                CREATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                if [ "${{ github.event.inputs.protocol }}" == "hysteria2" ] || [ -z "${{ github.event.inputs.protocol }}" ]; then
                  printf '{"protocol":"hysteria2","id":"%s","host":"%s","port":443,"password":"${{ steps.creds.outputs.password }}","sni":"%s","createdAt":"%s","expiresAt":"%s"}\n' \
                    "${HEARTBEAT_ID}" "${HOST}" "${HOST}" "${CREATED_AT}" "${EXPIRES_AT}" > /tmp/reregister.json
                elif [ "${{ github.event.inputs.protocol }}" == "vless" ]; then
                  printf '{"protocol":"vless","id":"%s","host":"%s","port":443,"uuid":"${{ steps.creds.outputs.uuid }}","sni":"%s","createdAt":"%s","expiresAt":"%s"}\n' \
                    "${HEARTBEAT_ID}" "${HOST}" "${HOST}" "${CREATED_AT}" "${EXPIRES_AT}" > /tmp/reregister.json
                fi
                curl -s -X POST "${COORDINATOR_URL}/register" \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${AUTH_TOKEN}" \
                  -d @/tmp/reregister.json || true
              else
                echo "💓 Heartbeat: HTTP $HTTP_CODE"
              fi
            fi
            echo "⏱️  Active for $i minutes... (${MINUTES_LEFT} min remaining)"
            sleep 60
          done
