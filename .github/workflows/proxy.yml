name: BPB Action Proxy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      protocol:
        description: "Proxy protocol"
        required: true
        default: "hysteria2"
        type: choice
        options:
          - vless
          - hysteria2

env:
  COORDINATOR_URL: ${{ secrets.COORDINATOR_URL }}
  AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Step 1: Install proxy software ---
      - name: Install Hysteria2
        if: github.event.inputs.protocol == 'hysteria2' || github.event.inputs.protocol == ''
        run: |
          echo "📦 Installing Hysteria2..."
          # Download directly from GitHub releases (install script is down)
          # Use known good version as fallback
          HY2_VERSION="${HY2_VERSION:-v2.5.0}"
          HY2_URL="https://github.com/apernet/hysteria/releases/download/${HY2_VERSION}/hysteria-linux-amd64"
          echo "Downloading from: $HY2_URL"

          wget -q --show-progress "${HY2_URL}.tar.gz" -O /tmp/hysteria.tar.gz 2>/dev/null || \
          wget -q --show-progress "${HY2_URL}.tar.xz" -O /tmp/hysteria.tar.xz 2>/dev/null || \
          wget -q --show-progress "https://github.com/apernet/hysteria/releases/download/app/v2/hysteria-linux-amd64.tar.gz" -O /tmp/hysteria.tar.gz

          # Try to extract
          mkdir -p /tmp/hysteria-extract
          tar -xzf /tmp/hysteria.tar.gz -C /tmp/hysteria-extract/ 2>/dev/null || \
          tar -xJf /tmp/hysteria.tar.xz -C /tmp/hysteria-extract/ 2>/dev/null || {
            echo "⚠️ Tar extraction failed, trying direct binary..."
            wget -q "https://github.com/apernet/hysteria/releases/download/app/v2/hysteria-linux-amd64" -O /tmp/hysteria-extract/hysteria
          }

          # Find and install the binary
          find /tmp/hysteria-extract -name "hysteria" -type f -exec sudo cp {} /usr/local/bin/hysteria \;
          sudo chmod +x /usr/local/bin/hysteria
          hysteria version || echo "⚠️ Hysteria2 version check failed but binary may still work"

      - name: Install sing-box (VLESS)
        if: github.event.inputs.protocol == 'vless'
        run: |
          echo "📦 Installing sing-box..."
          # Use known good version as fallback
          SINGBOX_VERSION="${SINGBOX_VERSION:-v1.10.0}"
          SINGBOX_URL="https://github.com/SagerNet/sing-box/releases/download/${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION#v}-linux-amd64.tar.gz"
          echo "Downloading from: $SINGBOX_URL"

          wget -q --show-progress "$SINGBOX_URL" -O /tmp/sing-box.tar.gz || {
            echo "Getting from GitHub release..."
            LATEST_URL=$(curl -s -L https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep -o '"browser_download_url": *"[^"]*linux-amd64[^"]*"' | head -1 | sed scanning "s/.*: \"\(.*\)\"$/\1/")
            wget -q --show-progress "$LATEST_URL" -O /tmp/sing-box.tar.gz
          }

          # Extract and install
          mkdir -p /tmp/sing-box-extract
          tar -xzf /tmp/sing-box.tar.gz -C /tmp/sing-box-extract/
          find /tmp/sing-box-extract -name "sing-box" -type f -exec sudo cp {} /usr/local/bin/sing-box \;
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version || echo "⚠️ sing-box version check failed but binary may still work"

      # --- Step 2: Generate random credentials ---
      - name: Generate credentials
        id: creds
        run: |
          echo "uuid=$(uuidgen)" >> $GITHUB_OUTPUT
          echo "password=$(openssl rand -hex 16)" >> $GITHUB_OUTPUT
          echo "port=$(shuf -i 20000-65000 -n 1)" >> $GITHUB_OUTPUT

      # --- Step 3: Create Hysteria2 config ---
      - name: Setup Hysteria2
        if: github.event.inputs.protocol == 'hysteria2'
        env:
          PASSWORD: ${{ steps.creds.outputs.password }}
          PORT: ${{ steps.creds.outputs.port }}
        run: |
          echo "🚀 Setting up Hysteria2..."
          cat > hysteria.yaml <<EOF
          listen: :$PORT
          tls:
            cert: /dev/null
            key: /dev/null
          auth:
            type: password
            password: $PASSWORD
          masquerade:
            type: proxy
            proxy:
              url: https://bing.com
              rewriteHost: true
          EOF
          nohup hysteria server --config hysteria.yaml &
          echo "🔗 Hysteria2 started on port $PORT"

      # --- Step 4: Create VLESS config ---
      - name: Setup sing-box (VLESS)
        if: github.event.inputs.protocol == 'vless'
        env:
          UUID: ${{ steps.creds.outputs.uuid }}
          PORT: ${{ steps.creds.outputs.port }}
        run: |
          echo "🚀 Setting up VLESS..."
          cat > sing-box.json <<EOF
          {
            "inbounds": [
              {
                "type": "vless",
                "listen": "::",
                "listen_port": $PORT,
                "users": [{ "uuid": "$UUID" }]
              }
            ],
            "outbounds": [{ "type": "direct" }]
          }
          EOF
          nohup sing-box run -c sing-box.json &
          echo "🔗 VLESS started on port $PORT"

      # --- Step 5: Install cloudflared tunnel ---
      - name: Setup Cloudflare Tunnel
        run: |
          echo "🌐 Setting up Cloudflare Tunnel..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb 2>/dev/null || true

          # Start tunnel
          nohup cloudflared tunnel --no-autoupdate --url http://localhost:${{ steps.creds.outputs.port }} > tunnel.log 2>&1 &
          sleep 5

          # Extract tunnel URL
          TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -n1 || echo "")
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_ENV
          echo "🌍 Tunnel URL: $TUNNEL_URL"

      # --- Step 6: Register with coordinator ---
      - name: Register proxy
        if: env.COORDINATOR_URL != ''
        run: |
          echo "📡 Registering with coordinator..."

          if [ "${{ github.event.inputs.protocol }}" == "hysteria2" ]; then
            curl -X POST "${{ env.COORDINATOR_URL }}/register" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ env.AUTH_TOKEN }}" \
              -d "{
                \"protocol\": \"hysteria2\",
                \"id\": \"gha-$GITHUB_RUN_ID\",
                \"host\": \"$(echo $TUNNEL_URL | sed 's|https://||')\",
                \"port\": 443,
                \"password\": \"${{ steps.creds.outputs.password }}\",
                \"sni\": \"$(echo $TUNNEL_URL | sed 's|https://||')\",
                \"createdAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }" || echo "WARNING: Failed to register - check COORDINATOR_URL"
          elif [ "${{ github.event.inputs.protocol }}" == "vless" ]; then
            curl -X POST "${{ env.COORDINATOR_URL }}/register" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ env.AUTH_TOKEN }}" \
              -d "{
                \"protocol\": \"vless\",
                \"id\": \"gha-$GITHUB_RUN_ID\",
                \"host\": \"$(echo $TUNNEL_URL | sed 's|https://||')\",
                \"port\": 443,
                \"uuid\": \"${{ steps.creds.outputs.uuid }}\",
                \"sni\": \"$(echo $TUNNEL_URL | sed 's|https://||')\",
                \"createdAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }" || echo "WARNING: Failed to register - check COORDINATOR_URL"
          fi

      # --- Step 7: Print subscription URL ---
      - name: Output subscription info
        run: |
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "🎉 BPB Action Proxy is running!"
          echo ""
          echo "🔗 Protocol: ${{ github.event.inputs.protocol || 'hysteria2' }}"
          echo "🔗 Public URL: $TUNNEL_URL"
          echo ""
          if [ "${{ github.event.inputs.protocol }}" == "hysteria2" ] || [ -z "${{ github.event.inputs.protocol }}" ]; then
            echo "🔐 Password: ${{ steps.creds.outputs.password }}"
          elif [ "${{ github.event.inputs.protocol }}" == "vless" ]; then
            echo "🔐 UUID: ${{ steps.creds.outputs.uuid }}"
          fi
          echo ""
          if [ -n "$COORDINATOR_URL" ]; then
            echo "📋 Subscription URL: $COORDINATOR_URL/sub/all"
            echo "   (Paste this into Hiddify!)"
          else
            echo "⚠️  No COORDINATOR_URL set - here is your direct connection string:"
            echo ""
            HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
            if [ "${{ github.event.inputs.protocol }}" == "hysteria2" ] || [ -z "${{ github.event.inputs.protocol }}" ]; then
              echo "hysteria2://${{ steps.creds.outputs.password }}@${HOST}:443?insecure=1&sni=${HOST}#BPB-Action-Direct"
            elif [ "${{ github.event.inputs.protocol }}" == "vless" ]; then
              echo "vless://${{ steps.creds.outputs.uuid }}@${HOST}:443?security=tls&encryption=none&headerType=none&type=tcp&sni=${HOST}#BPB-Action-Direct"
            fi
          fi
          echo ""
          echo "⏱️  This runner will stay alive for 45 minutes max"
          echo "═══════════════════════════════════════════════"

      # --- Step 8: Keep alive ---
      - name: Keep runner alive
        run: |
          echo "💤 Keeping alive... (Press Ctrl+C to stop)"
          for i in $(seq 1 45); do
            echo "⏱️  Active for $i minutes..."
            sleep 60
          done
