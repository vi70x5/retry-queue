name: BPB Action Proxy

on:
  workflow_dispatch:
    inputs:
      protocol:
        description: "Proxy protocol"
        required: true
        default: "vless"
        type: choice
        options:
          - vless
          - hysteria2
      tunnel:
        description: "Tunnel provider (Pinggy=raw TCP via SSH, TryCloudflare=HTTP/WS, Direct=P2P NAT, N2N=P2P VPN overlay)"
        required: true
        default: "pinggy"
        type: choice
        options:
          - pinggy
          - trycloudflare
          - direct
          - n2n

env:
  COORDINATOR_URL: ${{ secrets.COORDINATOR_URL }}
  AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
  NETWORK_ID: ${{ secrets.NETWORK_ID || 'bpb-default' }}
  BOOTSTRAP_PEERS: ${{ secrets.BOOTSTRAP_PEERS || '' }}
  VLESS_UUID_SECRET: ${{ secrets.VLESS_UUID || '' }}
  HY2_PASSWORD_SECRET: ${{ secrets.HY2_PASSWORD || '' }}
  MESH_PUBLIC_KEY_ID: ${{ secrets.MESH_PUBLIC_KEY_ID || 'default' }}

  N2N_COMMUNITY: ${{ secrets.N2N_COMMUNITY || '' }}
  N2N_KEY: ${{ secrets.N2N_KEY || '' }}
  N2N_SUPERNODE: ${{ secrets.N2N_SUPERNODE || 'supernode.ntop.org:7777' }}
  N2N_VIRTUAL_IP: ${{ secrets.N2N_VIRTUAL_IP || '10.10.10.1' }}

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Step 1: Install Hysteria2 ---
      - name: Install Hysteria2
        if: github.event.inputs.protocol == 'hysteria2'
        run: |
          echo "📦 Installing Hysteria2..."
          HY2_URL=$(curl -sL https://api.github.com/repos/apernet/hysteria/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*hysteria-linux-amd64"' \
            | grep -v avx | head -1 | sed 's/.*: *"\(.*\)"$/\1/')
          if [ -z "$HY2_URL" ]; then
            HY2_URL="https://github.com/apernet/hysteria/releases/download/app/v2.9.2/hysteria-linux-amd64"
          fi
          echo "Downloading from: $HY2_URL"
          wget -q "$HY2_URL" -O /tmp/hysteria && chmod +x /tmp/hysteria && sudo mv /tmp/hysteria /usr/local/bin/hysteria
          hysteria version || echo "⚠️ Hysteria2 version check failed but binary may still work"

      # --- Step 1.2: Install sing-box (VLESS) ---
      - name: Install sing-box (VLESS)
        if: github.event.inputs.protocol == 'vless'
        run: |
          echo "📦 Installing sing-box..."
          SINGBOX_URL=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*linux-amd64[^"]*\.tar\.gz"' \
            | head -1 | sed 's/.*: *"\(.*\)"$/\1/')
          if [ -z "$SINGBOX_URL" ]; then
            SINGBOX_URL="https://github.com/SagerNet/sing-box/releases/download/v1.10.0/sing-box-1.10.0-linux-amd64.tar.gz"
          fi
          echo "Downloading from: $SINGBOX_URL"
          wget -q "$SINGBOX_URL" -O /tmp/sing-box.tar.gz
          mkdir -p /tmp/sing-box-extract
          tar -xzf /tmp/sing-box.tar.gz -C /tmp/sing-box-extract/
          find /tmp/sing-box-extract -name "sing-box" -type f -exec sudo cp {} /usr/local/bin/sing-box \;
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version || echo "⚠️ sing-box version check failed but binary may still work"

      # --- Step 2: Generate random credentials ---
      - name: Generate credentials
        id: creds
        run: |
          if [ -n "${VLESS_UUID_SECRET:-}" ]; then
            echo "::add-mask::$VLESS_UUID_SECRET"
            echo "uuid=$VLESS_UUID_SECRET" >> $GITHUB_OUTPUT
          else
            echo "uuid=$(uuidgen)" >> $GITHUB_OUTPUT
          fi
          if [ -n "${HY2_PASSWORD_SECRET:-}" ]; then
            echo "::add-mask::$HY2_PASSWORD_SECRET"
            echo "password=$HY2_PASSWORD_SECRET" >> $GITHUB_OUTPUT
          else
            echo "password=$(openssl rand -hex 16)" >> $GITHUB_OUTPUT
          fi
          echo "port=$(shuf -i 20000-65000 -n 1)" >> $GITHUB_OUTPUT

      # --- Step 2.5: Setup n2n P2P VPN overlay ---
      - name: Setup n2n P2P Network
        if: github.event.inputs.tunnel == 'n2n'
        run: |
          echo "🌐 Setting up n2n P2P VPN overlay..."
          sudo apt-get update -qq && sudo apt-get install -y -qq n2n

          if [ -z "$N2N_COMMUNITY" ] || [ -z "$N2N_KEY" ]; then
            echo "❌ N2N_COMMUNITY and N2N_KEY secrets are required for n2n tunnel"
            echo "   Set them in: Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo "🔐 Starting n2n edge (community=$N2N_COMMUNITY, supernode=$N2N_SUPERNODE, ip=$N2N_VIRTUAL_IP)"
          sudo edge -c "$N2N_COMMUNITY" -k "$N2N_KEY" -a "$N2N_VIRTUAL_IP" -l "$N2N_SUPERNODE" -f > /tmp/n2n.log 2>&1 &

          sleep 5
          if ip addr show edge0 > /dev/null 2>&1; then
            echo "✅ n2n connected! Virtual IP: $N2N_VIRTUAL_IP"
            echo "TUNNEL_HOST=$N2N_VIRTUAL_IP" >> $GITHUB_ENV
            echo "TUNNEL_PORT=${{ steps.creds.outputs.port }}" >> $GITHUB_ENV
          else
            echo "❌ n2n connection failed. Logs:"
            cat /tmp/n2n.log
            exit 1
          fi

      # --- Step 3: Create Hysteria2 config ---
      - name: Setup Hysteria2
        if: github.event.inputs.protocol == 'hysteria2'
        env:
          PASSWORD: ${{ steps.creds.outputs.password }}
          PORT: ${{ steps.creds.outputs.port }}
        run: |
          echo "🚀 Setting up Hysteria2..."

          # Bind address: use n2n virtual IP if n2n tunnel, otherwise all interfaces
          if [ "${{ github.event.inputs.tunnel }}" == "n2n" ]; then
            LISTEN_ADDR="${{ env.N2N_VIRTUAL_IP }}"
          else
            LISTEN_ADDR="0.0.0.0"
          fi

          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
            -nodes -keyout /tmp/hy2-key.pem -out /tmp/hy2-cert.pem \
            -days 1 -subj "/CN=bpb-action"

          cat > /tmp/hysteria.yaml <<YAML
          listen: ${LISTEN_ADDR}:${PORT}
          tls:
            cert: /tmp/hy2-cert.pem
            key: /tmp/hy2-key.pem
          auth:
            type: password
            password: $PASSWORD
          masquerade:
            type: proxy
            proxy:
              url: https://bing.com
              rewriteHost: true
          YAML
          nohup hysteria server --config /tmp/hysteria.yaml > /tmp/hy2.log 2>&1 &
          sleep 2
          if ! grep -q "FATAL" /tmp/hy2.log 2>/dev/null; then
            echo "🔗 Hysteria2 started on port $PORT"
          else
            echo "⚠️ Hysteria2 failed to start"
            cat /tmp/hy2.log
          fi

      # --- Step 4: Create VLESS config ---
      # For TryCloudflare, we use WebSocket transport.
      # For Pinggy, we use raw, fast TCP transport.
      - name: Setup sing-box (VLESS)
        if: github.event.inputs.protocol == 'vless'
        env:
          UUID: ${{ steps.creds.outputs.uuid }}
          PORT: ${{ steps.creds.outputs.port }}
        run: |
          # Bind address: use n2n virtual IP if n2n tunnel, otherwise all interfaces
          if [ "${{ github.event.inputs.tunnel }}" == "n2n" ]; then
            LISTEN_ADDR="${{ env.N2N_VIRTUAL_IP }}"
          else
            LISTEN_ADDR="::"
          fi

          if [ "${{ github.event.inputs.tunnel }}" == "trycloudflare" ]; then
            echo "🚀 Setting up VLESS + WebSocket (for Cloudflare) on $LISTEN_ADDR..."
            printf '{\n  "inbounds": [\n    {\n      "type": "vless",\n      "listen": "%s",\n      "listen_port": %s,\n      "users": [{ "uuid": "%s" }],\n      "transport": {\n        "type": "ws",\n        "path": "/ws"\n      }\n    }\n  ],\n  "outbounds": [{ "type": "direct" }]\n}\n' "$LISTEN_ADDR" "$PORT" "$UUID" > /tmp/sing-box.json
          else
            echo "🚀 Setting up VLESS over raw TCP on $LISTEN_ADDR..."
            printf '{\n  "inbounds": [\n    {\n      "type": "vless",\n      "listen": "%s",\n      "listen_port": %s,\n      "users": [{ "uuid": "%s" }]\n    }\n  ],\n  "outbounds": [{ "type": "direct" }]\n}\n' "$LISTEN_ADDR" "$PORT" "$UUID" > /tmp/sing-box.json
          fi

          nohup sing-box run -c /tmp/sing-box.json > /tmp/singbox.log 2>&1 &
          sleep 2
          if ! grep -q 'FATAL\|error' /tmp/singbox.log 2>/dev/null; then
            echo "🔗 VLESS started on port $PORT"
          else
            echo "⚠️ VLESS failed to start"
            cat /tmp/singbox.log
          fi

      # --- Step 5a: Setup Pinggy TCP Tunnel (SSH-based, No bore.pub needed) ---
      - name: Setup Pinggy Tunnel
        if: github.event.inputs.tunnel == 'pinggy'
        run: |
          echo "🌐 Setting up Pinggy TCP Tunnel (SSH-based, no download)..."

          # Pinggy uses SSH — already available on ubuntu-latest
          # -R0:localhost:PORT = request a random TCP port on the relay
          # tcp@a.pinggy.io = Pinggy TCP relay server
          nohup ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:${{ steps.creds.outputs.port }} tcp@a.pinggy.io > /tmp/tunnel.log 2>&1 &
          sleep 8

          # Parse assigned host:port from Pinggy output
          # Output format: "Connecting..." then "tcp://a.pinggy.io:XXXXX"
          PINGGY_HOST=a.pinggy.io
          PINGGY_PORT=$(grep -oE 'a\.pinggy\.io:[0-9]+' /tmp/tunnel.log | grep -oE '[0-9]+' | head -n1 || \
                      grep -oE 'tcp://[a-z0-9.-]+:[0-9]+' /tmp/tunnel.log | grep -oE '[0-9]+' | head -n1 || echo "")

          if [ -z "$PINGGY_PORT" ]; then
            echo "⚠️ Failed to get Pinggy port. Log:"
            cat /tmp/tunnel.log
            exit 1
          fi

          echo "TUNNEL_HOST=$PINGGY_HOST" >> $GITHUB_ENV
          echo "TUNNEL_PORT=$PINGGY_PORT" >> $GITHUB_ENV
          echo "🌍 Tunnel URL: $PINGGY_HOST:$PINGGY_PORT"

      # --- Step 5b: Setup Cloudflare Tunnel (TryCloudflare HTTP) ---
      - name: Setup Cloudflare Tunnel
        if: github.event.inputs.tunnel == 'trycloudflare'
        run: |
          echo "🌐 Setting up Cloudflare Tunnel..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb 2>/dev/null || true

          # Start tunnel pointing at the proxy port
          nohup cloudflared tunnel --no-autoupdate --url http://localhost:${{ steps.creds.outputs.port }} > /tmp/tunnel.log 2>&1 &
          sleep 8

          # Extract tunnel URL
          TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -n1 || echo "")
          HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
          echo "TUNNEL_HOST=$HOST" >> $GITHUB_ENV
          echo "TUNNEL_PORT=443" >> $GITHUB_ENV
          echo "🌍 Tunnel URL: $TUNNEL_URL"

          if [ -z "$TUNNEL_URL" ]; then
            echo "⚠️ Failed to get tunnel URL. Tunnel log:"
            tail -20 /tmp/tunnel.log
            exit 1
          fi

      # --- Step 5c: Setup Direct P2P UDP NAT Hole Punching ---
      - name: Setup Direct P2P Tunnel
        if: github.event.inputs.tunnel == 'direct'
        run: |
          echo "🌐 Resolving NAT Mapping with STUN for Direct P2P..."
          # Run the STUN punch script from the same port as our proxy
          PUNCH_OUTPUT=$(python3 scripts/stun_punch.py ${{ steps.creds.outputs.port }} 2>/dev/null || echo "FAILED")
          echo "Punch Output: $PUNCH_OUTPUT"

          if [ "$PUNCH_OUTPUT" == "FAILED" ] || [ -z "$PUNCH_OUTPUT" ]; then
            echo "⚠️ STUN Resolution Failed! Checking alternate STUN servers..."
            PUNCH_OUTPUT=$(python3 -c "
            import sys
            sys.path.append('scripts')
            import stun_punch as sp
            mapping = sp.get_stun_mapping(${{ steps.creds.outputs.port }}, 'stun.3cx.com')
            if mapping: print(f'{mapping[0]}:{mapping[1]}')
            else: print('FAILED')
            " 2>/dev/null || echo "FAILED")
          fi

          if [ "$PUNCH_OUTPUT" == "FAILED" ] || [ -z "$PUNCH_OUTPUT" ]; then
            echo "❌ All STUN servers failed. Direct P2P is not possible on this network."
            exit 1
          fi

          STUN_IP=$(echo "$PUNCH_OUTPUT" | cut -d':' -f1)
          STUN_PORT=$(echo "$PUNCH_OUTPUT" | cut -d':' -f2)

          echo "TUNNEL_HOST=$STUN_IP" >> $GITHUB_ENV
          echo "TUNNEL_PORT=$STUN_PORT" >> $GITHUB_ENV
          echo "🌍 Direct P2P Endpoint: $STUN_IP:$STUN_PORT"

      # --- Step 5.7: Calculate expiry time ---
      - name: Calculate expiry time
        run: |
          EXPIRES_AT=$(date -u -d "+45 minutes" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v+45M +%Y-%m-%dT%H:%M:%SZ)
          echo "EXPIRES_AT=$EXPIRES_AT" >> $GITHUB_ENV

      # --- Step 6: Register with coordinator ---
      # Build JSON payload as a temp file to avoid shell quoting nightmares.
      # NOTE: We use a shell guard instead of `if: env.COORDINATOR_URL != ''` because
      #       the env context from secrets is sometimes not populated at if-evaluation time.
      - name: Register proxy
        env:
          MESH_SIGNING_PRIVATE_KEY: ${{ secrets.MESH_SIGNING_PRIVATE_KEY || '' }}
          PROTOCOL: ${{ github.event.inputs.protocol }}
          TUNNEL: ${{ github.event.inputs.tunnel }}
        run: |
          echo "🔍 DEBUG: COORDINATOR_URL=[${COORDINATOR_URL:-EMPTY}]"
          echo "🔍 DEBUG: AUTH_TOKEN=[${AUTH_TOKEN:+SET}]"
          echo "🔍 DEBUG: TUNNEL_HOST=[${TUNNEL_HOST:-EMPTY}]"
          echo "🔍 DEBUG: TUNNEL_PORT=[${TUNNEL_PORT:-EMPTY}]"
          if [ -z "${COORDINATOR_URL:-}" ]; then
            echo "ℹ️ No COORDINATOR_URL set — skipping registration."
            echo "   To enable, set the COORDINATOR_URL repo secret."
            exit 0
          fi
          echo "📡 Registering with coordinator..."
          PROXY_ID="gha-$GITHUB_RUN_ID"
          CREATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Determine VLESS transport params based on selected tunnel
          if [ "${{ github.event.inputs.tunnel }}" == "trycloudflare" ]; then
            TYPE_PARAM="ws"
            PATH_PARAM="/ws"
            SECURITY_PARAM="tls"
          else
            TYPE_PARAM="tcp"
            PATH_PARAM=""
            SECURITY_PARAM="none"
          fi

          if [ "${{ github.event.inputs.protocol }}" == "hysteria2" ]; then
            printf '{\n  "protocol": "hysteria2",\n  "id": "%s",\n  "host": "%s",\n  "port": %s,\n  "password": "${{ steps.creds.outputs.password }}",\n  "sni": "%s",\n  "createdAt": "%s",\n  "expiresAt": "%s"\n}\n' \
              "${PROXY_ID}" "${TUNNEL_HOST}" "${TUNNEL_PORT}" "${TUNNEL_HOST}" "${CREATED_AT}" "${EXPIRES_AT}" > /tmp/register.json
          elif [ "${{ github.event.inputs.protocol }}" == "vless" ]; then
            printf '{\n  "protocol": "vless",\n  "id": "%s",\n  "host": "%s",\n  "port": %s,\n  "uuid": "${{ steps.creds.outputs.uuid }}",\n  "sni": "%s",\n  "type": "%s",\n  "path": "%s",\n  "security": "%s",\n  "createdAt": "%s",\n  "expiresAt": "%s"\n}\n' \
              "${PROXY_ID}" "${TUNNEL_HOST}" "${TUNNEL_PORT}" "${TUNNEL_HOST}" "${TYPE_PARAM}" "${PATH_PARAM}" "${SECURITY_PARAM}" "${CREATED_AT}" "${EXPIRES_AT}" > /tmp/register.json
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${COORDINATOR_URL}/register" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -d @/tmp/register.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "📡 Registration response (HTTP $HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "⚠️ Registration failed. Payload omitted because it can contain proxy secrets."
            exit 1
          fi

          if [ -n "${MESH_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::add-mask::$MESH_SIGNING_PRIVATE_KEY"
            export PROXY_ID CREATED_AT TYPE_PARAM PATH_PARAM SECURITY_PARAM
            node <<'NODE'
          const crypto = require("crypto");
          const fs = require("fs");

          function canonical(value) {
            if (Array.isArray(value)) return value.map(canonical);
            if (value && typeof value === "object") {
              return Object.keys(value).sort().reduce((out, key) => {
                if (value[key] !== undefined) out[key] = canonical(value[key]);
                return out;
              }, {});
            }
            return value;
          }

          function keyFromSecret(secret) {
            if (secret.includes("BEGIN")) return secret;
            return Buffer.from(secret, "base64");
          }

          const protocol = process.env.PROTOCOL;
          const tunnel = process.env.TUNNEL;
          const host = process.env.TUNNEL_HOST;
          const port = Number(process.env.TUNNEL_PORT);
          const nodeId = crypto
            .createHash("sha256")
            .update(`${process.env.GITHUB_REPOSITORY}:${process.env.GITHUB_RUN_ID}:${process.env.GITHUB_RUN_ATTEMPT}:${protocol}:${host}`)
            .digest("hex");
          const ingress =
            tunnel === "trycloudflare" ? "cloudflared_quick" : tunnel === "n2n" ? "n2n" : tunnel === "pinggy" ? "pinggy" : "direct";
          const transport = protocol === "vless" ? process.env.TYPE_PARAM : undefined;
          const path = protocol === "vless" && process.env.PATH_PARAM ? process.env.PATH_PARAM : undefined;
          const security = process.env.SECURITY_PARAM || (tunnel === "trycloudflare" ? "tls" : "none");
          const record = {
            schema: "animamesh.proxy.v1",
            networkId: process.env.NETWORK_ID || "bpb-default",
            nodeId,
            run: {
              repository: process.env.GITHUB_REPOSITORY || "",
              runId: process.env.GITHUB_RUN_ID || "",
              runAttempt: process.env.GITHUB_RUN_ATTEMPT || "1",
              workflow: process.env.GITHUB_WORKFLOW || "proxy.yml",
              actor: process.env.GITHUB_ACTOR || "",
            },
            protocol,
            ingress,
            endpoint: {
              host,
              port,
              sni: host,
              transport,
              path,
              security,
            },
            capabilities: {
              ipv4: true,
              ipv6: false,
              udp: protocol === "hysteria2",
            },
            lifecycle: {
              createdAt: process.env.CREATED_AT,
              expiresAt: process.env.EXPIRES_AT,
              heartbeatAt: process.env.CREATED_AT,
              ttlSeconds: 2700,
            },
            publicKeyId: process.env.MESH_PUBLIC_KEY_ID || "default",
            signature: "",
          };
          const { signature: _signature, ...unsigned } = record;
          record.signature = crypto
            .sign(null, Buffer.from(JSON.stringify(canonical(unsigned))), keyFromSecret(process.env.MESH_SIGNING_PRIVATE_KEY || ""))
            .toString("base64");
          fs.writeFileSync("/tmp/mesh-register.json", JSON.stringify({ record }, null, 2));
          fs.writeFileSync(
            "/tmp/mesh-heartbeat.json",
            JSON.stringify({ networkId: record.networkId, nodeId: record.nodeId, expiresAt: record.lifecycle.expiresAt }, null, 2),
          );
          NODE

            MESH_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${COORDINATOR_URL}/mesh/register" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${AUTH_TOKEN}" \
              -d @/tmp/mesh-register.json || true)
            MESH_HTTP_CODE=$(echo "$MESH_RESPONSE" | tail -1)
            MESH_BODY=$(echo "$MESH_RESPONSE" | head -n -1)
            echo "📡 Mesh registration response (HTTP $MESH_HTTP_CODE): $MESH_BODY"
          else
            echo "ℹ️ MESH_SIGNING_PRIVATE_KEY is not set; skipping V3 mesh registration."
          fi

      # --- Step 7: Print subscription URL ---
      - name: Output subscription info
        run: |
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "🎉 BPB Action Proxy is running!"
          echo ""
          echo "🔗 Protocol: ${{ github.event.inputs.protocol }}"
          echo "🔗 Tunnel: ${{ github.event.inputs.tunnel }}"
          echo "🔗 Public Host: $TUNNEL_HOST"
          echo "🔗 Public Port: $TUNNEL_PORT"
          if [ "${{ github.event.inputs.tunnel }}" == "n2n" ]; then
            echo "🧬 n2n Virtual IP: $N2N_VIRTUAL_IP"
            echo "   Client must also join n2n network:"
            echo "   sudo edge -c <N2N_COMMUNITY> -k <N2N_KEY> -a 10.10.10.2 -l $N2N_SUPERNODE"
          fi
          echo "🔐 Proxy credentials are masked and not printed."
          echo ""
          if [ -n "$COORDINATOR_URL" ]; then
            echo "📋 Subscription URL: $COORDINATOR_URL/sub/all"
            echo "   (Paste this into Hiddify!)"
          else
            echo "⚠️  No COORDINATOR_URL set - check your run params"
          fi
          echo ""
          echo "⏱️  This runner will stay alive for 45 minutes max"
          echo "═══════════════════════════════════════════════"

      # --- Step 7.5: Start DHT Mesh Node (best-effort, non-blocking) ---
      - name: Start DHT Mesh Node
        if: env.TUNNEL_HOST != ''
        continue-on-error: true
        env:
          MESH_PORT: 4001
          NETWORK_ID: ${{ secrets.NETWORK_ID || 'bpb-default' }}
          PROXY_PROTOCOL: ${{ github.event.inputs.protocol }}
          PROXY_HOST: ${{ env.TUNNEL_HOST }}
          PROXY_PORT: ${{ env.TUNNEL_PORT }}
          VLESS_UUID: ${{ steps.creds.outputs.uuid }}
          HY2_PASSWORD: ${{ steps.creds.outputs.password }}
          TTL_MINUTES: 45
          BOOTSTRAP_PEERS: ${{ secrets.BOOTSTRAP_PEERS || '' }}
          TUNNEL_TYPE: ${{ github.event.inputs.tunnel }}
          TUNNEL_HOST: ${{ env.TUNNEL_HOST }}
          TUNNEL_PORT: ${{ env.TUNNEL_PORT }}
        run: |
          echo "🌐 Starting libp2p DHT mesh layer..."
          if [ -d node ]; then
            cd node && npm install --silent 2>&1 && npx tsx src/index.ts &
            echo "🧬 DHT mesh node launched in background (PID $!)"
          else
            echo "ℹ️ node/ package is not present; skipping DHT mesh layer."
          fi

      # --- Step 8: Keep alive with heartbeat ---
      - name: Keep runner alive with heartbeat
        run: |
          echo "💤 Keeping alive with heartbeat..."
          HEARTBEAT_ID="gha-$GITHUB_RUN_ID"
          MINUTES_LEFT=45

          # Every 30 seconds, we do a keep-alive loop (90 iterations over 45 minutes)
          for i in $(seq 1 90); do
            # 1. Direct P2P NAT Keep-alive (run STUN punch to refresh gateway mapping)
            if [ "${{ github.event.inputs.tunnel }}" == "direct" ]; then
              python3 scripts/stun_punch.py ${{ steps.creds.outputs.port }} > /dev/null 2>&1 || true
            fi

            # 2. Coordinator Heartbeat (every 5 minutes = 10 loop iterations)
            if [ $((i % 10)) -eq 0 ] && [ -n "$COORDINATOR_URL" ]; then
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "${COORDINATOR_URL}/heartbeat" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${AUTH_TOKEN}" \
                -d "{\"id\": \"${HEARTBEAT_ID}\", \"expiresAt\": \"${EXPIRES_AT}\"}" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "404" ]; then
                echo "⚠️ Proxy record lost, re-registering..."
                CREATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                if [ "${{ github.event.inputs.tunnel }}" == "trycloudflare" ]; then
                  TYPE_PARAM="ws"
                  PATH_PARAM="/ws"
                  SECURITY_PARAM="tls"
                else
                  TYPE_PARAM="tcp"
                  PATH_PARAM=""
                  SECURITY_PARAM="none"
                fi

                if [ "${{ github.event.inputs.protocol }}" == "hysteria2" ]; then
                  printf '{\n  "protocol": "hysteria2",\n  "id": "%s",\n  "host": "%s",\n  "port": %s,\n  "password": "${{ steps.creds.outputs.password }}",\n  "sni": "%s",\n  "createdAt": "%s",\n  "expiresAt": "%s"\n}\n' \
                    "${HEARTBEAT_ID}" "${TUNNEL_HOST}" "${TUNNEL_PORT}" "${TUNNEL_HOST}" "${CREATED_AT}" "${EXPIRES_AT}" > /tmp/reregister.json
                elif [ "${{ github.event.inputs.protocol }}" == "vless" ]; then
                  printf '{\n  "protocol": "vless",\n  "id": "%s",\n  "host": "%s",\n  "port": %s,\n  "uuid": "${{ steps.creds.outputs.uuid }}",\n  "sni": "%s",\n  "type": "%s",\n  "path": "%s",\n  "security": "%s",\n  "createdAt": "%s",\n  "expiresAt": "%s"\n}\n' \
                    "${HEARTBEAT_ID}" "${TUNNEL_HOST}" "${TUNNEL_PORT}" "${TUNNEL_HOST}" "${TYPE_PARAM}" "${PATH_PARAM}" "${SECURITY_PARAM}" "${CREATED_AT}" "${EXPIRES_AT}" > /tmp/reregister.json
                fi
                curl -s -X POST "${COORDINATOR_URL}/register" \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${AUTH_TOKEN}" \
                  -d @/tmp/reregister.json || true
              else
                echo "💓 Heartbeat: HTTP $HTTP_CODE"
              fi

              if [ -f /tmp/mesh-heartbeat.json ]; then
                MESH_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X POST "${COORDINATOR_URL}/mesh/heartbeat" \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${AUTH_TOKEN}" \
                  -d @/tmp/mesh-heartbeat.json 2>/dev/null || echo "000")
                if [ "$MESH_HTTP_CODE" = "404" ] && [ -f /tmp/mesh-register.json ]; then
                  echo "⚠️ Mesh record lost, re-registering..."
                  MESH_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                    -X POST "${COORDINATOR_URL}/mesh/register" \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer ${AUTH_TOKEN}" \
                    -d @/tmp/mesh-register.json 2>/dev/null || echo "000")
                fi
                echo "💓 Mesh heartbeat: HTTP $MESH_HTTP_CODE"
              fi
            fi

            # Print status and sleep for 30s
            if [ $((i % 2)) -eq 0 ]; then
              MINS_PASSED=$((i / 2))
              MINS_LEFT=$((45 - MINS_PASSED))
              echo "⏱️  Active for ${MINS_PASSED} minutes... (${MINS_LEFT} min remaining)"
            fi
            sleep 30
          done

          if [ -n "$COORDINATOR_URL" ] && [ -f /tmp/mesh-heartbeat.json ]; then
            curl -s -X POST "${COORDINATOR_URL}/mesh/deregister" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${AUTH_TOKEN}" \
              -d @/tmp/mesh-heartbeat.json >/dev/null 2>&1 || true
          fi
